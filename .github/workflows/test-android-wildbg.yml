name: Test Android Build - wildbg engine

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Clone wildbg source (nets branch - strong networks)
        run: |
          git clone --depth 1 --branch nets https://github.com/carsten-wenderdel/wildbg.git source
          
      - name: Show source structure
        run: |
          echo "=== crates ==="
          ls -la source/crates
          echo "=== wildbg-c crate ==="
          ls -la source/crates/wildbg-c || echo "not found, will inspect crates dir above"
          echo "=== Cargo.toml of wildbg-c (if found) ==="
          cat source/crates/wildbg-c/Cargo.toml || true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android targets to Rust
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android

      - name: Set up Android NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager --install "ndk;26.3.11579264"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Patch wildbg-c Cargo.toml to build cdylib
        working-directory: source
        run: |
          python3 - <<'EOF'
          import re
          path = "crates/wildbg-c/Cargo.toml"
          with open(path) as f:
              content = f.read()

          if '[lib]' in content:
              def repl(m):
                  line = m.group(0)
                  inner = re.search(r'\[(.*)\]', line).group(1)
                  types = [t.strip().strip('"').strip("'") for t in inner.split(',') if t.strip()]
                  if 'cdylib' not in types:
                      types.insert(0, 'cdylib')
                  new_list = ', '.join(f'"{t}"' for t in types)
                  return f'crate-type = [{new_list}]'
              if re.search(r'crate-type\s*=\s*\[[^\]]*\]', content):
                  content = re.sub(r'crate-type\s*=\s*\[[^\]]*\]', repl, content, count=1)
              else:
                  content = content.replace('[lib]', '[lib]\ncrate-type = ["cdylib", "staticlib"]', 1)
          else:
              content += '\n[lib]\ncrate-type = ["cdylib", "staticlib"]\n'

          with open(path, 'w') as f:
              f.write(content)

          print("=== Patched Cargo.toml ===")
          print(content)
          EOF

      - name: Build wildbg-c for Android (arm64-v8a + armeabi-v7a + x86_64)
        working-directory: source
        run: |
          cargo ndk -t arm64-v8a -t armeabi-v7a -t x86_64 -o ../jniLibs build --release -p wildbg-c 2>&1 | tee ../build.log
        continue-on-error: true

      - name: Search for build output (.so files and header)
        run: |
          echo "=== .so files ==="
          find . -name "*.so" || echo "none found"
          echo "=== wildbg.h header ==="
          find source -name "wildbg.h" || echo "none found"

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload .so libraries (always, even if partial)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-libs
          path: jniLibs/**
          if-no-files-found: warn

      - name: Upload C header
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wildbg-header
          path: source/crates/wildbg-c/wildbg.h
          if-no-files-found: warn

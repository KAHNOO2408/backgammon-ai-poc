name: Test NDK Build - gnubg AI engine

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Clone libgnubg-android source
        run: |
          git clone --depth 1 https://github.com/alcacoop/libgnubg-android.git source

      - name: Show source structure
        run: |
          echo "=== Root ==="
          ls -la source
          echo "=== jni ==="
          ls -la source/jni || echo "no jni dir at root"
          echo "=== libgnubg ==="
          ls -la source/libgnubg || echo "no libgnubg dir"
          echo "=== Looking for Android.mk files ==="
          find source -iname "Android.mk" -o -iname "Application.mk"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install a legacy-compatible NDK version
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager --install "ndk;25.2.9519653"
          echo "NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Attempt ndk-build
        working-directory: source
        run: |
          echo "Using NDK at: $NDK_HOME"
          $NDK_HOME/ndk-build APP_ABI=armeabi-v7a -j4 V=1 2>&1 | tee ../build.log
        continue-on-error: true

      - name: Search for build output (.so files)
        run: |
          echo "=== Any .so files produced ==="
          find source -name "*.so" || echo "none found"

      - name: Upload build log (always, even on failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload any .so output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: so-files
          path: source/**/*.so
          if-no-files-found: warn
